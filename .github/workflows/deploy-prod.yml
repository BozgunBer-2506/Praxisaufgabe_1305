name: Deploy to Production

on:
  push:
    tags:
      - 'v*'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Slack - Deployment started
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Production-Pipeline gestartet\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🏷️ Tag: ${{ github.ref_name }}\"}"

      - name: Deploy to all Prod EC2 instances
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > /tmp/deploy_key
          chmod 600 /tmp/deploy_key
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          for IP in ${{ secrets.EC2_IPS_PROD }}; do
            echo "Deploying to $IP..."
            ssh-keyscan -H "$IP" >> ~/.ssh/known_hosts 2>/dev/null
            ssh -i /tmp/deploy_key -o StrictHostKeyChecking=no ubuntu@"$IP" "sudo chown -R ubuntu:ubuntu /var/www/html"
            scp -i /tmp/deploy_key -o StrictHostKeyChecking=no frontend/index.html ubuntu@"$IP":/var/www/html/index.html
          done

          rm -f /tmp/deploy_key

      - name: Slack - Deployment successful
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Production erfolgreich deployed!\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🏷️ Version: ${{ github.ref_name }}\n🌐 URL: http://${{ secrets.EC2_IPS_PROD }}\"}"

      - name: Slack - Deployment failed
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Production-Deployment FEHLGESCHLAGEN!\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🔗 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

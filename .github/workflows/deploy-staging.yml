name: Deploy to Staging

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Slack - Deployment started
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"🚀 Staging-Pipeline gestartet\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🔗 Commit: ${{ github.sha }}\"}"

      - name: Fix permissions on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_IP_STAGING }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: sudo chown -R ubuntu:ubuntu /var/www/html

      - name: Deploy via SCP to Staging
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_IP_STAGING }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "frontend/index.html"
          target: /var/www/html
          strip_components: 1
          overwrite: true

      - name: Slack - Deployment successful
        if: success()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"✅ Staging erfolgreich deployed!\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🌐 URL: http://${{ secrets.EC2_IP_STAGING }}\"}"

      - name: Slack - Deployment failed
        if: failure()
        run: |
          curl -s -X POST "${{ secrets.SLACK_WEBHOOK_URL }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"❌ Staging-Deployment FEHLGESCHLAGEN!\n👤 Gestartet von: *${{ github.actor }}*\n⚙️ Workflow: ${{ github.workflow }}\n🔗 Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
